{% load i18n %}
<form class="pg-chat-input-bar"
      {% if chat %}
      hx-post="{% url 'chat:new_chat_message' chat.id %}"
      {% else %}
      hx-post="{% url 'chat:start_chat' %}"
      {% endif %}
      hx-swap="outerHTML">
  <input name="message" type="text" placeholder="Type your message..." aria-label="Message" class="pg-control">
  <input type="hidden" name="chat_type" value="{{ chat_type|default:'chat' }}">
  <input type="hidden" name="agent_type" value="{{ agent_type|default:'' }}">
  <button type="submit" class="pg-button-primary mx-2">{% translate "Send" %}</button>
</form>
