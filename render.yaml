# Redis instance (for celery and/or caching)
  - type: redis
    name: gzarruk_site-redis
    region: oregon
    ipAllowList: []
    plan: free

# Postgres database
databases:
  - name: gzarruk_site
    plan: free
    region: oregon
    databaseName: gzarruk_site
    user: gzarruk_site
    ipAllowList: [] # only allow internal connections
